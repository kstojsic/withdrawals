<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      /* HashRouter reads location.hash; ensure we have a path so Routes match */
      (function () {
        if (!location.hash || location.hash === '#' || location.hash === '#/') {
          if (location.hash !== '#/') location.replace(location.pathname + location.search + '#/');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Questrade - Withdrawals (Mobile)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root" class="mobile-root"></div>
    <script type="module" src="/src/mobile/main.tsx"></script>
  </body>
</html>
