# Production deploy on push to `mobile`.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID — see docs/VERCEL_DEPLOY.md
#
# Uses remote build on Vercel (no local `vercel pull` / `vercel build --prebuilt`) — fewer CI failures.

name: Deploy to Vercel (mobile branch)

on:
  push:
    branches:
      - mobile
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check secrets are set
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          ok=1
          if [ -z "${VERCEL_TOKEN:-}" ]; then echo "::error::VERCEL_TOKEN is empty — see docs/GITHUB_SECRETS_STEP_BY_STEP.md"; ok=0; fi
          if [ -z "${VERCEL_ORG_ID:-}" ]; then echo "::error::VERCEL_ORG_ID is empty — see docs/GITHUB_SECRETS_STEP_BY_STEP.md"; ok=0; fi
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then echo "::error::VERCEL_PROJECT_ID is empty — see docs/GITHUB_SECRETS_STEP_BY_STEP.md"; ok=0; fi
          if [ "$ok" -eq 0 ]; then exit 1; fi
          echo "All three secrets are non-empty (lengths: token=${#VERCEL_TOKEN} org=${#VERCEL_ORG_ID} project=${#VERCEL_PROJECT_ID})"

      - name: Deploy to Vercel (remote build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@50.34.3 deploy --prod --yes --token="$VERCEL_TOKEN"
