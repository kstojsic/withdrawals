# Optional: run manually from GitHub → Actions if you use token-based deploy.
# With the repo connected in Vercel, pushes to `mobile` already trigger deployments.
#
# Secrets (repo → Settings → Secrets): VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

name: Deploy to Vercel (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"
